<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Beyond the Bottle</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Beyond the Bottle 🍷</h1>
        <p>Descubre el mundo del vino de forma simple y elegante</p>
    </div>

    <!-- LECCIÓN -->
    <h2 class="section">📚 Lección 1</h2>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1510626176961-4b57d4fbad03" 
             style="width:100%; border-radius:10px; margin-bottom:10px;">

        <p>El vino puede ser:</p>
        <ul style="text-align:left;">
            <li>Tinto</li>
            <li>Blanco</li>
            <li>Rosado</li>
        </ul>
    </div>

    <!-- RESEÑAS -->
    <h2 class="section">⭐ Reseñas de la comunidad</h2>

    <div class="card">
        <input type="text" id="nombre" placeholder="Tu nombre"><br><br>
        <button onclick="guardarNombre()">Guardar nombre</button><br><br>

        <textarea id="comentario" placeholder="Escribe tu opinión"></textarea><br><br>
        <button onclick="agregarResena()">Publicar</button>
    </div>

    <div id="contenedorResenas"></div>

    <!-- IA -->
    <h2 class="section">🤖 Recomendador de vinos</h2>

    <div class="card">
        <input type="text" id="preferencia" placeholder="Ej: algo dulce o para carne"><br><br>
        <button onclick="recomendarVino()">Recomendar</button>

        <p id="resultadoIA"></p>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
