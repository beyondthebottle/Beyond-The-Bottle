<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">

    <title>Beyond the Bottle</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HERO -->
    <header class="hero">
        <div class="overlay">
            <div class="hero-content">
                <h1>Beyond the Bottle</h1>
                <p>Explora el vino como nunca antes</p>
            </div>
        </div>
    </header>

    <main class="container">

        <div class="grid">

            <!-- IZQUIERDA -->
            <div>
                <h2>📚 Aprende</h2>

                <div class="card">
                    <p>El vino puede ser:</p>
                    <ul>
                        <li>Tinto</li>
                        <li>Blanco</li>
                        <li>Rosado</li>
                    </ul>
                </div>

                <h2>🤖 IA</h2>

                <div class="card">
                    <input type="text" id="preferencia" placeholder="Ej: algo dulce o para carne">
                    <button onclick="recomendarVino()">Recomendar</button>
                    <p id="resultadoIA"></p>
                </div>
            </div>

            <!-- DERECHA -->
            <div>
                <h2>⭐ Comunidad</h2>

                <div class="card">
                    <input type="text" id="nombre" placeholder="Tu nombre">
                    <button onclick="guardarNombre()">Guardar nombre</button>

                    <textarea id="comentario" placeholder="Escribe tu opinión"></textarea>
                    <button onclick="agregarResena()">Publicar</button>
                </div>

                <div id="contenedorResenas"></div>
            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
