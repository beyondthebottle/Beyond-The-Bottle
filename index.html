<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beyond the Bottle</title>

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HERO PREMIUM -->
    <header class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Beyond the Bottle</h1>
                <p>Explora el vino como nunca antes</p>

                <a href="#contenido" class="btn-hero">Comenzar experiencia</a>
            </div>
        </div>
    </header>

    <!-- CONTENIDO -->
    <main id="contenido" class="container">

        <div class="grid">

            <!-- IZQUIERDA -->
            <section>

                <h2>📚 Aprende</h2>

                <div class="card">
                    <h3>Tipos de vino</h3>
                    <ul>
                        <li>Tinto</li>
                        <li>Blanco</li>
                        <li>Rosado</li>
                    </ul>
                </div>

                <div class="card highlight">
                    <h3>🌿 Cultura del vino</h3>
                    <p>El vino no es solo bebida, es historia, territorio y expresión.</p>
                </div>

                <h2>🤖 Recomendador inteligente</h2>

                <div class="card">
                    <input type="text" id="preferencia" placeholder="Ej: algo dulce o para carne">
                    <button onclick="recomendarVino()">Recomendar vino</button>
                    <p id="resultadoIA"></p>
                </div>

            </section>

            <!-- DERECHA -->
            <section>

                <h2>⭐ Comunidad</h2>

                <div class="card">
                    <input type="text" id="nombre" placeholder="Tu nombre">

                    <textarea id="comentario" placeholder="Comparte tu experiencia con este vino..."></textarea>

                    <button onclick="agregarResena()">Publicar reseña</button>
                </div>

                <div id="contenedorResenas" class="reviews"></div>

            </section>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
