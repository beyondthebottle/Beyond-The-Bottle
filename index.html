<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">

    <title>Beyond the Bottle</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <h1>Beyond the Bottle</h1>
            <p>Descubre el mundo del vino de forma elegante</p>
        </div>
    </header>

    <main class="container">

        <div class="grid">

            <!-- COLUMNA IZQUIERDA -->
            <div class="col">

                <h2>📚 Aprende</h2>

                <div class="card">

                    <!-- IMAGEN CONTROLADA -->
                    <div class="hero-img"></div>

                    <p>El vino puede ser:</p>
                    <ul>
                        <li>Tinto</li>
                        <li>Blanco</li>
                        <li>Rosado</li>
                    </ul>

                </div>

                <h2>🤖 IA</h2>

                <div class="card">
                    <input type="text" id="preferencia" placeholder="Ej: algo dulce o para carne">
                    <button onclick="recomendarVino()">Recomendar</button>
                    <p id="resultadoIA"></p>
                </div>

            </div>

            <!-- COLUMNA DERECHA -->
            <div class="col">

                <h2>⭐ Comunidad</h2>

                <div class="card">
                    <input type="text" id="nombre" placeholder="Tu nombre">
                    <button onclick="guardarNombre()">Guardar nombre</button>

                    <textarea id="comentario" placeholder="Escribe tu opinión"></textarea>
                    <button onclick="agregarResena()">Publicar</button>
                </div>

                <div id="contenedorResenas"></div>

            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
